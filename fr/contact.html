        <div class="container">

                            <textarea name="message" rows="5" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px;"></textarea>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Envoyer le message</button>
